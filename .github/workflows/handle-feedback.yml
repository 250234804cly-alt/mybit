name: Handle User Feedback

on:
  repository_dispatch:
    types: [user-feedback]

jobs:
  create-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Parse feedback and create issue
        uses: actions/github-script@v7
        with:
          script: |
            const payload = context.payload.client_payload;
            const feedback = payload.feedback;
            const submittedAt = payload.submitted_at || new Date().toISOString();

            let title, body, labels;

            if (feedback.type === 'errata') {
              // 纠错 / 新增机型
              const errataTypeMap = {
                'wrong-data': '数据有误',
                'missing-model': '缺少机型',
                'other': '其他'
              };
              const errataLabel = errataTypeMap[feedback.errataType] || feedback.errataType;

              title = `[数据反馈] ${errataLabel}：${feedback.brand} ${feedback.model}`;
              labels = ['feedback', 'errata'];

              body = [
                `## 📋 数据反馈`,
                ``,
                `| 字段 | 内容 |`,
                `|------|------|`,
                `| **反馈类型** | ${errataLabel} |`,
                `| **品牌** | ${feedback.brand} |`,
                `| **型号** | ${feedback.model} |`,
                `| **额定功率 (W)** | ${feedback.power} |`,
                `| **额定流量 (L/min)** | ${feedback.flow} |`,
                feedback.pressure ? `| **额定压力 (bar)** | ${feedback.pressure} |` : null,
                ``,
                feedback.note ? `### 备注\n${feedback.note}` : null,
                ``,
                `---`,
                `🕐 提交时间：${submittedAt}`,
                `📌 来源：PA 泡沫壶喷芯计算器用户反馈`
              ].filter(Boolean).join('\n');

            } else if (feedback.type === 'suggestion') {
              // 应用建议
              title = `[建议] ${feedback.content.slice(0, 50)}${feedback.content.length > 50 ? '...' : ''}`;
              labels = ['feedback', 'suggestion'];

              body = [
                `## 💡 用户建议`,
                ``,
                feedback.content,
                ``,
                `---`,
                `🕐 提交时间：${submittedAt}`,
                `📌 来源：PA 泡沫壶喷芯计算器用户反馈`
              ].join('\n');

            } else {
              core.setFailed(`Unknown feedback type: ${feedback.type}`);
              return;
            }

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels
            });

            core.info(`Created issue #${issue.data.number}: ${issue.data.html_url}`);
