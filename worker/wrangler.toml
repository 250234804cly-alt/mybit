name = "foam-feedback"
main = "feedback-worker.js"
compatibility_date = "2024-01-01"
account_id = "9bd8bcd47b06909fc50d32a9ea3db133"

# 非敏感配置可以放这里
[vars]
GITHUB_REPO = "250234804cly-alt/mybit"
ALLOWED_ORIGIN = "https://junyuchen.cn"

# KV namespace 绑定（需先在 Cloudflare Dashboard 创建，或用 wrangler kv:namespace create）
# 创建命令：wrangler kv:namespace create "ANALYTICS"
# 创建后把返回的 id 填到下面
[[kv_namespaces]]
binding = "ANALYTICS"
id = "YOUR_KV_NAMESPACE_ID"

# ⚠️ Secrets 必须通过 wrangler secret 设置，绝不要写在这个文件里！
# 部署步骤：
#   wrangler secret put GITHUB_TOKEN     ← GitHub Fine-grained PAT
#   wrangler secret put STATS_SECRET     ← 统计接口访问密钥（随便设一个强密码）
